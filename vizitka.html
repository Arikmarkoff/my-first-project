<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Аркадий Марков — Мастер по ремонту ракеток</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --border: #1e1e1e;
      --accent1: #00d4ff;
      --accent2: #7b2fff;
      --accent3: #ff6b35;
      --text: #e8e8e8;
      --muted: #666;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(0, 212, 255, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(123, 47, 255, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255, 107, 53, 0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0%   { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(0, 212, 255, 0.04);
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Avatar */
    .avatar-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent1));
      padding: 2px;
      margin-bottom: 28px;
      position: relative;
    }

    .avatar-wrap::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--accent1), var(--accent2), var(--accent3), var(--accent1));
      z-index: -1;
      opacity: 0.4;
      animation: spin 6s linear infinite;
      filter: blur(4px);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-inner svg {
      width: 52px;
      height: 52px;
    }

    /* Name */
    .name {
      font-size: clamp(26px, 6vw, 36px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      background: linear-gradient(120deg, #ffffff 0%, var(--accent1) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% auto;
      animation: shimmer 4s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .name-glow {
      position: absolute;
      width: 100%;
      left: 0;
      font-size: clamp(26px, 6vw, 36px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--accent1);
      filter: blur(20px);
      opacity: 0.18;
      pointer-events: none;
      user-select: none;
    }

    .name-wrap {
      position: relative;
      margin-bottom: 10px;
    }

    /* Specialization */
    .spec {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spec::before,
    .spec::after {
      content: '';
      flex: 1;
      max-width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border));
    }

    .spec::after {
      background: linear-gradient(to left, transparent, var(--border));
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 28px 0;
    }

    /* Skills tags */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 36px;
    }

    .tag {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid;
      letter-spacing: 0.03em;
    }

    .tag-cyan  { color: var(--accent1); border-color: rgba(0, 212, 255, 0.25); background: rgba(0, 212, 255, 0.07); }
    .tag-purple { color: var(--accent2); border-color: rgba(123, 47, 255, 0.25); background: rgba(123, 47, 255, 0.07); }
    .tag-orange { color: var(--accent3); border-color: rgba(255, 107, 53, 0.25); background: rgba(255, 107, 53, 0.07); }

    /* Social links */
    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .social-btn.tg::before   { background: linear-gradient(135deg, rgba(0,136,204,0.2), rgba(0,212,255,0.15)); }
    .social-btn.web::before  { background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,160,80,0.15)); }
    .social-btn.max::before  { background: linear-gradient(135deg, rgba(123,47,255,0.2), rgba(160,100,255,0.15)); }

    .social-btn svg {
      position: relative;
      z-index: 1;
      transition: transform 0.25s, color 0.25s;
      width: 30px;
      height: 30px;
    }

    .social-btn:hover {
      transform: translateY(-4px) scale(1.08);
      border-color: transparent;
    }

    .social-btn.tg:hover  { box-shadow: 0 8px 28px rgba(0, 136, 204, 0.35); color: #29b6f6; }
    .social-btn.web:hover { box-shadow: 0 8px 28px rgba(255, 107, 53, 0.35); color: #ff6b35; }
    .social-btn.max:hover { box-shadow: 0 8px 28px rgba(123, 47, 255, 0.35); color: #a064ff; }

    .social-btn:hover::before { opacity: 1; }

    /* CTA Button */
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 28px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
      background: linear-gradient(135deg, var(--accent2) 0%, var(--accent1) 100%);
      box-shadow: 0 4px 24px rgba(0, 212, 255, 0.2);
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .cta::after {
      content: '';
      position: absolute;
      width: 120%;
      height: 100%;
      top: 0;
      left: -110%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }

    .cta:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 40px rgba(0, 212, 255, 0.35), 0 4px 16px rgba(123, 47, 255, 0.3);
    }

    .cta:hover::before { opacity: 1; }
    .cta:hover::after  { left: 110%; }

    .cta:active {
      transform: translateY(0) scale(0.98);
    }

    .cta svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Footer */
    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 36px 24px 32px;
        border-radius: 20px;
      }
    }

  </style>
</head>
